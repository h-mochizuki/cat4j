plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.9.1'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

tasks.withType(JavaCompile).configureEach { options.encoding = 'UTF-8' }
['sourceCompatibility', 'targetCompatibility'].each { java."$it" = '17' }

jar {
    applicationName = 'cat4j'
}

application {
    mainClass = 'gmochmoch.Cat4j'
}

startScripts {
    applicationName = 'cat4j'
}

tasks.named('test') {
    useJUnitPlatform()
}
